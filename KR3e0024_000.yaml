body:
  text: 素問入式運氣論奧醫家類提要臣等謹案素問入式運氣論奧三卷附黃帝內經素問遺篇一卷宋劉溫舒撰溫舒里居未詳前有元符己卯序舊題朝散郎太醫學司業蓋以醫通籍者也朝公武讀書志云溫舒以素問運氣為治病之要而問答紛揉文詞古奧讀者難知因為三十論二十七圖上于朝今詳考其圖實二十九蓋十干起運十二支司天二圖原本别題曰訣故公武不以入數僅曰二十有七其論實為三十一篇末五行勝復論一篇原本别注附字故公武亦不以入數僅曰三十也卷末别附刺法論一卷題曰黃帝內經素問遺篇按刺法論已亡在王氷作注之前溫舒生北宋之末何從得此其注亦不知出自何人殆不免有所依托未可盡信焦竑經籍志載此書作四卷合此論為一書益舛誤矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀素問入式運氣論奧序夫醫書者乃三墳之經伏羲觀天文造甲厯神農嘗百藥制本草黃帝論疾苦成素問因知其道奧妙不易窮研自非留心刻意豈達玄機且以其間氣運最為補寫之要雖備見黃帝與岐伯鬼臾區問對分糅篇章卒無入法稍難施用余性識偏陋竊慕真風棲心聖典積有嵗月雖吏役塵勞之暇亦未嘗暫捨筆萃斯文久以盈軸莫不究源附説解惑分圖括上古運氣之祕文撮斯書隂陽之精論若網之在綱珠之在貫粲然明白箋明奧義咸有指歸詎飾文辭庶易曉晤使覽者經目頓知妙道幾過半矣詎敢沽譽且畏醫藥之差誤遺人夭殃絶人長命爾元符己卯嵗丁丑月望日序
