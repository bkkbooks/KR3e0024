body:
  text: 素問入式運氣論奧卷中宋劉溫舒撰論五天之氣第十一天地支干相錯而列於八方各有定位星宿環列垂象於其上而各有分野故大古占天望氣以書于冊垂示後人在精意以考之而後可明也蓋天分五氣地列五行五氣分流散於其上經於列宿下合方隅則命之以為五運丹天之氣經于牛女奎璧四宿之上下臨戊癸之位立為火運黅天之氣經于心尾角軫四宿之上下臨甲巳之位立為土運素天之氣經于亢氐昴畢四宿之上下臨乙庚之位立為金運𤣥天二氣經于張翼婁胃四宿之上下臨丙辛之位立為水運蒼天之氣經于危室柳鬼四宿之上下臨丁壬之位立為木運此五氣所經二十八宿與十二分位相臨則灼然可見因此以紀五天而立五運也戌為天門乾之位也巳為地户巽之位也自房至畢十四宿為陽主晝自昴至心十四宿為隂主夜通一日也論五音建運第十二五音者五行之音聲也土曰宫金曰商木曰角火曰徵水曰羽在陽年則曰太在隂年曰少晉書曰角觸也象諸陽氣觸動而生其位丁壬嵗也徴止也言物盛則止其位戊癸嵗也商强也謂金性之堅强其位乙庚嵗也羽舒也陽氣將復萬物慈育而舒生其位丙辛嵗也宫中也中和之道無往而不理又總堂室奧阼而謂之宫所圍不一蓋土亦以通貫於金木水火王於四季榮於四藏皆總之之意也其位甲巳嵗也故五運從十干起甲為土也土生金故乙次之金生水故丙次之如此五行相生而轉甲為陽乙為隂亦相間而數如環之無端詳其五音五運之由莫不上下相召小大相乘同歸於治而已是故因刻以成日因日以成月因月以成嵗遞相因以制用雖大古占天望氣定位之始見黅天之氣橫於甲巳為土運素天之氣橫於乙庚為金運𤣥天之氣橫於丙辛為水運蒼天之氣橫於丁壬為木運丹天之氣橫於戊癸為火運則莫不有從焉若以月建之法論之則立運之因又可見也何哉丙者火之陽建於甲巳嵗之首正月建丙寅丙火生土故甲巳為土運戊者土之陽建於乙庚嵗之首正月建戊寅戊土生金故乙庚為金運庚者金之陽建於丙辛嵗之首正月建庚寅庚金生水故丙辛為水運甲者木之陽建於戊癸嵗之首正月得甲寅甲木生火故戊癸為火運壬者水之陽建於丁壬嵗之首正月得壬寅壬水生木故丁壬為木運是五運皆生於正月建干豈非日月嵗時相因而制用哉論月建第十三夫十二支為十二月則正月寅二月卯是也甲巳之嵗正月建丙寅乙庚之嵗正月建戊寅丙辛之嵗正月建庚寅丁壬之嵗正月建壬寅戊癸之嵗正月建甲寅乃用十干建於寅上觀其法甲子年為首亦用六十甲子內初見者先建之次見者次建之故丙寅為初戊寅為次依先後循而轉之可見也前六十甲子納音圖中立位既終復轉於其上以終其紀者明矣建時貼用日干同法若五運隂年不及之嵗大寒日交初氣其日時建干與年干合者謂之曰干德符當為平氣非過與不及也略舉此以明其用而已論天地六氣第十四圖在主氣客氣文內經曰天地合氣六節分而萬物化生矣然地列五行者言其用也分支於十二自五行隂陽之氣以布八方蓋天氣降而下則地氣遷而上咸備五行之化氣然後合其用觀萬物未嘗不因天地之氣而化生之也地之氣靜而常天之氣動而變其六氣之源則同六氣之緒則異何哉蓋天之氣始於少隂而終於厥隂經曰少隂所謂標厥隂所謂終是也地之氣始於厥隂木而終於太陽水經曰顯明之右君火之位者其緒是也然不同之緒乃天真神元二氣相因而成焉故天之六元氣反合地十二支以五行正化對化為其緒則少隂司子午太隂司丑未少陽司寅申陽明司卯酉太陽司辰戌厥隂司己亥天氣始終之因如是而已地之六氣反合天之四時風熱暑濕燥寒為其緒則厥隂風木主春少隂君火主春末夏初少陽相火主夏太隂濕土主長夏陽明燥金主秋太陽寒水主冬地氣終始之因如是而已經曰天有隂陽地亦有隂陽者乃上下相臨也天氣動而不息故五嵗而冶遷應地氣靜而守位天氣不加於君火則五嵗而餘一氣右遷相火之上以君火不立嵗故也地之紀五嵗一周天之紀六㫷一備五嵗一周則五行之氣遍六㫷一備則六氣之位周與干加支之緒小同取隂陽相錯上下相乘畢其紀之之意也以五六相合故三十年一紀之則六十年矣論主氣第十五地氣靜而守位則春溫夏暑秋凉冬寒為嵗嵗之常令四時為六氣之所主也厥隂木為初氣者方春氣之始也木生火故少隂君火少陽相火次之火生土故太隂土次之土生金故陽明金次之金生水故太陽水次之皆相生而布其令莫不咸有緒焉木為初氣主春分前六十日有竒自斗建丑正至卯之中天度至此風氣乃行也君火為二氣主春分後六十日有竒自斗建卯正至巳之中天度至此暄淑乃行也相火為三氣主夏至前後各三十日有竒自斗建巳正至未之中天度至此炎熱乃行也土為四氣主秋分前六十日有竒自斗建未正至酉之中天度至此雲雨乃行濕蒸乃作也金為五氣主秋分後六十日有竒自斗建酉正至亥之中天度至此清氣乃行萬物皆燥也水為六氣主冬至前後各三十日有竒自斗建亥正至丑之中天度至此寒氣乃行也六位旋相主氣以成一嵗則天之六氣每嵗轉居於其上以行天令者也其交日時前已具載矣論客氣第十六六氣分上下左右而行天令十二支分節令時日而司地化上下相召而寒暑燥濕風火與四時之氣不同者蓋相臨不一而使然也六氣司於十二支者有正對之化也然厥隂所以司於己亥者何也謂厥隂木也木生於亥故正化於亥對化於巳也雖有卯為正木之分乃陽明金對化也所以從生而順於巳也少隂所以司於子午者何也謂少隂為君火尊位所以正得南方離位故正化於午對化於子也太隂所以司於丑未者何也謂太隂為土土屬中宫寄於坤位西南居未分也故正化於未對化於丑也少陽所以司於寅申者何也謂少陽相火位卑於君火也雖有午位君火居之火生於寅故正化於寅對化於申也陽明所以司於卯酉者何也謂陽明為金酉為西方西方屬金故正化於酉對化於卯也太陽所以司於辰戌者何也謂太陽為水雖有子位以居君火對化一本於此處云則居辰戌辰戌屬土故水為土用孟子曰水由地中行斯可見矣水乃伏土中即六戊天門戌是也六巳地户辰是也故水雖土用正化於戌對化於辰也此𤣥珠之說已詳矣莫不各有因焉此天之隂陽合地之十二支動而不息者也但將年律起當年司天數至者為司天相對一氣為在泉餘氣為左右間用在泉後一氣為初之氣主六十日餘八十七刻半至司天為三之氣主上半年自大寒日後通主上半年也至在泉為六氣主下半年自大暑日後通主下半年也少隂子為首順行又常為大過司天大過不及亦間數則與十干起運圖上下相合也故經曰嵗半巳前天氣主之嵗半巳後地氣主之者此也天之六氣客也將此客氣布於地之六氣步位之上則有氣化之異矣經曰上下有位左右有紀者謂司天曰上位在南方則面北立左右乃左西右東也在泉曰下位在北方則面南立左右乃左東右西也故上下異而左右殊六微㫖論曰少陽之右陽明治之之緒者乃南面而立以閲氣之至也非論上下左右之位而與顯明之左右火治之之意同謂面南視之指位而言也論天符第十七隂陽交遘上下臨御而後有淫勝欎復之變此大法也司天者司之為言直也主行天之令上之位也嵗運者運之為言動也主天地之間人物化生之氣中之位也在泉者主地之化行乎地中下之位也一嵗之中有此上中下三氣各行化令而氣偶符㑹而同者則通其化雖無尅復之變則有中病徐暴之異是謂當年之中司天之氣與中氣運同者命曰天符符之為言合也天符共十二年而十二年之中又有與當年十二律五行同者又是嵗㑹命曰太一天符太一者所以尊之之號也謂一者天㑹二者嵗㑹三者運㑹上有四年不論隂年陽年皆曰天符故經曰天符為執法嵗位為行令太一天符為貴人邪之中人則執法者其病連而危行病者其病徐而持貴人者其病暴而死蓋以氣令故中人則深矣嵗㑹干律同而非天令則所以言行令者注曰象方伯無執法之權故無速害病但執持而已論嵗㑹第十八夫當年十干建運與年辰十二律五行相㑹故曰嵗㑹氣之主也則不以隂年陽年乃是取四時正中之月為四直承嵗子午卯酉是也而土無正位各寄王於四季之末一十八日有竒則通論承嵗辰戌丑未是也巳上共八年外有四年壬寅皆木庚申皆金是二陽年癸巳皆火辛亥皆水是二隂年亦是運與年辰相㑹而不為嵗㑹者謂不當四年正中之令故也除二陽年則癸巳辛亥二隂年雖不名嵗㑹亦上下五行相佐皆為平氣之嵗物生脉應皆必合期無先後矣嵗㑹八年中內四年與司天氣同已入太一天符也餘並見前論中論同天符同嵗㑹第十九六氣循環互司天地大過不及隨于隂陽制而為凖上中下氣輪有符合天符嵗㑹前巳載之運氣與在泉合其氣化陽年曰同天符隂年曰同嵗㑹故六十年中太一天符四年天符十二年嵗㑹八年同天符六年同嵗㑹六年五者離而言之共二十六年合而言之止有二十七年經言二十四嵗者不言嵗㑹也不可不審如是則通變行有多少病形有微甚生死有早暮按經推步誠可知矣論南北政第二十運用十干起則君火不當其運也六氣以君火為尊五運以濕土為尊故甲巳土運為南政蓋土以成數貫金木水火位居中央君尊南面而行令餘四運以臣事之面北而受令所以有别也而人脉應之甲巳之嵗二運南面論脉則寸在南而尺在北少隂司天兩寸不應少隂在泉兩尺不應乙丙丁戊庚辛壬癸之嵗四運面北論脉則寸在北而尺在南少隂司天兩尺不應少隂在泉兩寸不應乃以南為上北為下正如男子面南受氣尺脉常弱女子面北受氣尺脉常盛之理同以其隂氣沉下故不應耳六氣之位則少隂在中而厥隂居右太隂居左此不可易也其少隂則主兩寸尺厥隂司天在泉當在右故右不應大隂司天在泉當在左故左不應依南政而論尺寸也若覆其手診之則隂沉於下反況為浮細為大又經曰尺寸反者死隂陽交者死先立其年以知其氣左右應見然後乃可言死生之逆順者更在診以别其反詳其交而後造死生之微也素問入式運氣論奧卷中
