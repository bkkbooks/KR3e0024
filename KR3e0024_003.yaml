body:
  text: 素問入式運氣論奧卷下宋劉溫舒撰論大少氣運相臨同化第二十一天地遘醇物我被化則寒暑燥濕風共主乎一嵗之內生長化收藏咸偹乎萬物之中非秪一嵗也雖一時一刻之短而五行之氣莫不存非特一物也雖一毫一芒之細而五行之化莫不載然司其運步其氣或大或少乃輪主嵗時而更盛更衰也上達於天則有五星倍減之應下推於地則有五蟲耗肓之驗其五穀五果五味五色之化類豈有一嵗而無者惟成熟有多少色味有厚薄耳蓋金木水火土並行其化互有休囚王相不同之目而已直其運者獨以為之主當其時者專以為之客共行天令遇陽年則氣王而大過遇隂年則氣衰而不及太過已勝則欲齊其所勝之化不及已弱則勝者來兼其化大過嵗謂木齊金化金齊火化火齊水化水齊土化土齊木化也不及嵗謂木兼金同化金兼火同化火兼水同化水兼土同化土兼木同化也其司天與運相臨間有逆順相刑相佐司天則同其正抑運則反其平如是五氣平正則無相陵犯也大過之嵗五運各主六年乃五六三十陽年也大角謂六壬年逢子午寅申二火司天則木運為逆者火木之子也居其上為逆大徵謂六戊年內逢寒水司天正抑其火復為平氣之嵗上羽與正徴同也大宫謂六甲年也大商謂六庚年也內逢子午寅申二火司天正抑其金復為平氣之嵗上徴與正商同也逢辰戌水司天為逆者水金之子也居上為逆大羽謂六丙年也不及嵗五運各主六年乃五六三十隂年也少角謂六丁年也己亥木司天與運氣得助上角同正角也逢卯酉金司天與運兼化上商同正商也逢丑未土司天以木不及金兼化則土得其政上宫同正宫也少徵謂六癸年也內逢卯酉金司天以火不及水兼化則金得其政上商同正商也少宫謂六巳年也內逢丑未土司天與運合得其助上宫同正宫也逢己亥木司天與運兼化上角同正角也少商謂六乙年也內逢卯酉金司天與運氣合得其助上商同正商也逢己亥木司天以金不及火兼化則木得其政上角同正角也少羽謂六辛年也逢丑未土司天與運兼化上宫同正宫也內言上者乃司天之令其五大五少嵗所紀不同者蓋遇不遇也如君火相火寒水常為陽年司天濕土燥金風木常為隂年司天然六十年中各有上下臨遇或司天勝運或運勝司天或運當大過不務其德而淫勝其所不勝或運當不及而避其所勝而不兼其化及太一天符嵗㑹同天符同嵗㑹更按文推之此不再書也論紀運第二十二十干之中五隂五陽也立為五運大過不及互相乘之其不及之嵗則所勝者來尅蓋運之虛故也則其間自有嵗㑹同嵗㑹亦氣之平外有年辰相合及交氣日時干相合則得為巳助號曰平氣乃得嵗氣之平其物生脉應皆必合期無先後也聖人立名以紀之假令辛亥嵗水運當云平氣何也辛為水運隂年遇亥屬北方水相佐則水氣乃平假令癸巳年火運亦曰平氣何也癸為火運隂年已屬南方火相佐則火氣乃平又每年交初氣於年前大寒日假令丁亥交司之日遇日朔與壬合名曰干德符符者合也便為平氣若交司之時遇壬亦曰干德符除此交初氣日時之後相遇皆不相濟也餘皆倣此所謂甲巳合乙庚合丙辛合丁壬合戊癸合是也又隂年中若逢月干皆符合相濟若未逢勝而見之干合者亦為平氣若行勝已後行復已畢逢月干者即得正位則大過不及平氣紀嵗者當推而紀之故平氣之嵗不可預紀之十干之下列以隂陽年而紀者此乃大槩設此庶易知也平氣紀須以當年之辰日時干依法推之是以木運大角嵗曰發生大過少角嵗曰委和不及正角嵗曰敷和平氣火運大徵嵗曰赫曦大過少徵嵗曰伏明不及正徵嵗曰升明平氣土運大宫嵗曰敦阜大過少宫嵗曰卑監不及正宫嵗曰備化平氣金運太商嵗曰堅成大過少商嵗曰從革不及正商嵗曰審平平氣水運大羽嵗曰流衍大過少羽嵗曰涸流不及正羽嵗曰順靜平氣各以紀之也氣之平則同正化無過與不及也又詳大過運中有為司天之氣所抑者亦為平氣則赫曦之紀寒水司天二年堅成之紀二火司天四年皆平氣之嵗也論嵗中五運第二十三地之六位則分主於四時天之五運亦相生而終嵗度在素問篇中止見於六元正紀大論每十嵗一司天文中云初終正而已此則是一嵗主運也每運各主七十三日零五刻總五運之數則三百六十五日二十五刻共成一嵗蓋將當年年干起一嵗中通主三百六十五日大運為主將嵗之主運上下因之而名大少五音也若當年是木合自大角而下生之故曰初正太角木生少徵火少徵火生大宫土大宫土生少商金少商金生大羽水則為終亦以大過不及隨之也若當年少宫為大運則上下因之少宫土上乃見火故曰大徵大徵火上乃見木故曰少角則主運自少角起故初而至少羽水為終矣木為初之運大寒日交火為二之運春分後十三日交土為三之運小滿後二十五日交金為四之運大暑後三十七日交水為五之運秋分後四十九日交此乃一嵗之主運有大少之異也按天元玉冊截法中又有嵗之客運行於主運之上與六氣主客之法同故玉冊曰嵗中客運者常以應干前二干為初運申子辰嵗大寒日寅初交亥卯未嵗大寒日亥初交寅午戌嵗大寒日申初交己酉丑嵗大寒日巳初交此五運相生而終嵗度也然於經未見其用以六氣言之則運亦當有主客以行天令蓋五行之運一主其氣豈四而無用不行生化者乎然當年大運乃通主一嵗如司天通主上半年之法𤣥珠指此以謂六元還周言素問隱一音也按天元玉冊截法言五運之客互主一嵗則經所載者乃逐年之主運也明當以玉冊為法則其義通𤣥珠之說補注亦不取之論手足經第二十四夫人禀天地冲和之氣受五行生化之形隂陽剛柔萃於一身為萬物之靈通上下而謂三才者也故經言生氣根於中命曰神機是以藏府表裏各相配合然後致其和而宅神氣以為機發之主也非見於黃帝岐伯精微之論則莫能知之唯聖為能踐形者誠哉妙言也故經曰上古聖人論理人形列别藏府端絡經脉㑹通六合又曰五藏十二節皆通乎天氣者乃論手足經三隂三陽也其十二經外循身形內貫藏府以應十二月即十二節也五藏為隂六府為陽一隂一陽乃為一合即六合也夫少隂之經主心與腎二藏者蓋心屬火而少隂冬脉其本在腎又君火正司於午對化於子是以腎藏亦少隂主之腎非金水右屬命門火五藏為隂不可言陽水隨腎至故大陽為府則手大陽小腸足大陽膀胱也大隂之經主脾與肺二藏者蓋脾為土而大隂隂脉在肺又土生金子隨母居故肺大隂主之金隨肺至故陽明為府則手陽明大腸足陽明胃也厥隂之經主肝與心包絡二藏者蓋肝屬木又木生火子隨母居故心包厥隂主之火隨心包而至故少陽為府則手少陽三焦足少陽膽也其手足經者乃手經之脉自兩手起足經之脉自兩足起以十二辰言之蓋隂生於午隂上生故曰手經陽生於子陽下生故曰足經手足經所以紀上下也又心肺心包在上屬手經肝脾腎在下屬足經亦其意也藏府同為手足經乃一合也心包非藏也三焦非府也經曰膻中者臣使之官喜樂出焉在胸主兩乳間為氣之海然心主為君三焦者决瀆之官水道出焉三焦有名無形上合於手心主下合右腎主謁道諸氣名為使者共為十二經是以經曰隂陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也雖不可勝數然其要妙以離合推步悉可知之論勝復第二十五運有盛衰氣有虛實更相迎隨以司嵗也故經曰有餘而往不足隨之不足而往有餘從之者此也故運互有大少勝復之變作矣大過則先天時化以氣勝實故不勝者受邪不及則後天時化以氣衰虛故勝已者來尅被尅之後必待時而復也行復於所勝則已不可前故待得時則子當王然後子為母讎也如木運少角嵗金清化來勝則子火為復反熱化勝金火運少徵嵗水寒化來勝則子土為復反濕化勝水土運少宫嵗木風化來勝則子金為復反清化勝木金運少商嵗火熱化來勝則子水為復反寒化勝火水運少羽嵗土濕化來勝則子木為復反風化勝土故言勝復同者此也𤣥珠論六氣有正化對化之司若正司化令之實甚則勝而不復對司化令之虛微則勝而有復勝甚則復甚勝微則復微所謂邪氣化日也如是氣不相得則邪氣中人而疾病矣然天地之氣亦行勝復故經曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也蓋勝至則復復已而勝故無常氣乃止復而不勝則是生氣已絶故曰傷生也又嵗氣大過則不勝者受邪若得其實而又欺侮其所不勝已者運不及所勝者來尅乘氣之虛又為不勝已者陵侮如是終必受邪以元非勝已之氣必自傷也故經曰侮反受邪此之謂也五行之變如是不一則在氣候以别之矣論九宫分野第二十六論曰五運不及之嵗則有災宫所向之位故不可一槩而論災也經曰九星懸朗七曜周旋者乃天之九星所主之分野故少角嵗云災三宫東室震位天衝司也少徵嵗云災九宫南室離位天英司也少宫嵗云災五宫中室天禽司也寄位二宫坤位少商嵗云災七宫西室兊位天柱司也少羽嵗云災一宫北室坎位天蓬司也皆以運氣不及之方言之按天元玉冊曰天蓬一水正之宫也天芮二土神之應宫也天衝三木正之宫也天輔四木神之應宫也天禽五土正之宫也天心六金神之應宫也天柱七金正之宫也天任八火神之應宫也天英九火正之宫也下以應九州之分野謂冀兖青徐揚荆豫梁雍也論六十年客氣第二十七别有一圖在上卷首司天在泉四間氣紀步各主六十日八十七刻半客行天令居於主氣之上故有溫凉寒暑曚暝明晦風雨霜雪電雹雷霆不同之化其春溫夏暑秋凉冬寒四時之正令豈能全為運與氣所奪則當其時自有微甚之變矣布此六十年客氣旁通列於主位之下者使知其氣之所在大法也其天符嵗㑹平氣支干逆順氣與運相生相尅客勝主勝災化分野交時先後淫勝欎復嘉祥災變各各不同則經與𤣥珠皆備見之審天時占氣候若符契之相合也而六氣極則過亢災害生矣故氣極則反由是所乘之氣居下以乘之經所謂相火之下水氣承之者是也又有中見之氣從之經所謂少陽之上火氣治之中見厥隂是也蓋陽極則隂生隂極則陽生斯五行相濟之妙用也其中見者乃手足經六合藏府相乘之化者是也在天地間則氣自應之矣論六病第二十八厥隂所至為裏急筋緩縮急支痛軟戾脅痛嘔泄少隂所至為瘍疹身熱惡寒戰栗驚惑悲笑譫妄衄衊血汗也大隂所至為積飲痞鬲中滿霍亂吐下身重胕腫肉泥按之不起少陽所至為嚏嘔瘡瘍喉痺耳鳴嘔涌溢食不下驚躁瞀昧目不明暴注瞤瘛惡病暴死陽明所至為鼽嚏浮虛皴揭尻隂股膝髀腨胻足病大陽所至為屈伸不利腰痛寢汗痙流泄禁止此六氣之為病也按經㫖則淫勝欎復主客大少皆至其疾則邪之中人有淺深矣又在人禀受衝冒畏避而已其溫疫時氣或一州一縣無問大小皆病者分野山原丘谷向背斯氣運自然耳原夫人稟五行之氣生亦從五行之數盡內有五藏六府為生氣之源外有百骸四支為神機之用若起居調養而能避邪安正則於夀域之中無橫夭殃矣然為憂愁思慮喜怒牽於內寒暑燥濕風火干於外由是衆疾作而百病生又何況趨逐利名貪迷嗜欲勞役辛苦飢渴醉飽衝涉寒暑凌冒風雨觸犯禁忌殘賊真靈如是論之夭傷之由豈數之盡也歸咎於巳而已經曰不知持盈不時御神務快其心逆於生樂者此之謂也蓋天之邪氣感則害人五藏水穀之寒熱感則害人六府燥濕感則害人皮肉筋脉又喜怒傷氣寒暑傷形又風為百病之長至其變化乃為他病也病無常方致有風氣也又百病生於氣如是論之病生之變亦由乎我也良猶內外相感然後入故經曰所謂感邪而生病外有其氣內惡之中外不喜因而遂病是謂感乘年之虛失時之和遇月之空則邪甚矣重感於邪則病危矣此之謂也雖氣運交相臨遇相得則和不相得則病運大過則不勝者受邪運不及則所勝者來尅主客勝復欎發其病作矣若我之真元氣實起居有時動作無相衝冒縱使溫疫之作亦微是故聖人有養生修真之術也或者以謂天地五運六氣如何人病蓋人之五藏應天地之五行隂陽之氣隨其卷舒衰王故也王冰以謂蒼天布氣尚不越於五行人在氣中豈不應於天道蓋人之呼吸天地氤氲之氣以食飲五行造化之物以養共保其形豈不隨氣運隂陽之盛衰經曰天食人以五氣地食人以五味此之謂也夫人之胸鬲者蓋飲食之所納呼吸之所經若寒熱失節禁忌相干隂陽不和疾疫邪氣交至於胸中內舍五藏六府乃有凶之兆也故謂之胸然聖人論資取化源補不足寫有餘食嵗穀以安其氣食間殺以去其邪如是則病可避也但以五運六氣為疾而感之者多矣又經曰冬傷於寒春必病溫春傷於風夏必飱泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽傷四時之氣皆能為病方冬之時陽為主於內寒雖入之勢未能動及春陽出而隂為內主然後寒動而摶陽為溫疫之疾矣方夏之時隂為主於內暑雖入之勢未能動及秋隂出而陽為內主然後暑動而摶隂為瘧寒之疾矣又有四方之氣不同而為病各異故經有異法方宜之論以得病之情者是也又或當嵗有病而非嵗氣者亦須原其所感形證脉候未必盡為氣運所作在工以明之言之及此者免拘於氣運粗見補寫之誤與不誤也論六脉第二十九明隂陽運轉之六氣辨南北嵗政之尊卑察主勝客勝之由審淫勝欎復之變須在脉然後為工矣五運不及則所勝者來尅五運大過則不勝者受邪天地六氣互相臨遇應則順否則逆氣相得則和不相得則病唯天地勝復之氣不形於證者乃初氣終三氣天之勝四氣盡終氣地之復蓋以氣不以位故不以形證觀察也餘則當知六脉故經曰厥隂之至其脉絃少隂之至其脉釣大隂之至其脉沉少陽之至其脉大而浮陽明之至其脉短而澀大陽之至其脉大而長至而和則平至而甚則病至而反則病至而不至者病未至而至者病隂陽易者危此之謂也然人之生也雖五行備於一身生氣根於內亦隨天地之氣卷舒也何以明之謂如春脉絃夏脉洪秋脉毛冬脉石者是也則五運六氣亦皆應之而見於脉但以氣運深奧罕有論者故也夫人支體被其寒暑之化外保身形呼吸天地之氣內養府藏若上下和而節令時氣運調而寒熱順則無疾苦也然而嵗運更移氣令交遘盈虛相隨逆順交作變而生病者亦隂陽之常理也經曰逆之則變生變生則病物生其應也氣脉其應也此之謂也當立嵗氣以診别之運有南北政經言尺寸反者死隂陽交者死謂如北政兩寸當沉細不應而反浮大移於兩尺脉沉細不應是謂交如此者死謂如南政兩寸當沉細不應而反浮大移於兩尺沉細不應是謂反如此者死若寸獨然或尺獨然不應非交非反也止病而已舉此為例餘嵗同法故經曰必先嵗氣無伐天和粗工不識不知呼為寒熱攻寒令熱脉不變而熱疾已生制熱令寒脉如故而寒疾又起欲求其適安可得乎天枉之來率由此也原本經平人氣象論曰大陽脉至洪大而長少陽脉至乍數乍疏乍短乍長陽明脉至浮大而短難經引此亦論三隂三陽之脉者乃以隂陽始生之深淺而言之也此六脉者蓋言運與氣勝復臨遇正當行令當其司化之時而應故脉之動不相同以諸論考之則大同而小異也若交氣交運時日及期而見無相先後不及大甚方謂之平若差之者當知其病也經曰食氣入胃濁氣歸心淫精於脉脉氣流經經氣歸於肺肺朝百脉輸精於皮毛脉合精行氣於府府精神明留於四藏氣歸於權衡以平氣口成寸以决死生又曰五藏六府之氣味皆出於胃變見於氣口氣口即寸口也故秦越人深達其㫖作難經云獨取寸口以决五藏六府死生也正謂平人安樂之脉故漏水下一刻復㑹於手大隂可診五藏六府之氣以辨盛衰詳五十動中之止别死生者也本經自有平人氣象論皆論呼吸脉之動者也次論寸口脉平而死及上部無脉下部有脉雖困不為害者謂已病之人氣或疾或澀不能及期而至於寸口將何為凖故取尺脉為憑前後所論理各不同又何惑哉若能精通脉要三部九候七表八裏九道十二經參之運氣脉法可謂大醫之士也論治法第三十木位之主其寫以酸其補以辛厥隂之客以辛補之以酸寫之以甘緩之火位之主其寫以甘其補以鹹少隂之客以甘寫之以鹹收之少陽之客以鹹補之以甘寫之以鹹耎之土位之主其寫以苦其補以甘大隂之客以甘補之以苦寫之以甘緩之金位之主其寫以辛其補以酸陽明之客以酸補之以辛寫之以苦泄之水位之主其寫以鹹其補以苦大陽之客以苦補之以鹹寫之以苦堅之以辛潤之此六氣主客之補寫也客勝則寫客補主主勝則寫主補客應隨當緩當急以治之也而本經論又有六氣司天在泉淫勝之治法有司天在泉反勝之治法有嵗運上下所宜藥食之治法如是不一各依疾苦順其運令以藥石五味調治之蓋五運六氣勝復淫欎其亦災眚不同司天居陽之分在泉居隂之分主客逆順之理不一由是百疾交作故聖人備述其狀副以辛酸甘苦鹹淡之味補寫平治佐宜之法者可謂備矣為工者當明其嵗令察其形證診其脉息别其隂陽依經㫖而拯救之何患疾之不瘥邪論其用藥性味之不同者或順其性則逆其情或以所勝或以所不勝或以上下子母相益相伐之味以補以寫皆其妙用以互相見也其疾病要妙載於經篇論之中最詳而多法然此五運六氣藥石補寫之宜亦當順其四方之人稟受所養不同故經有異法方宜之論及其施用針藥則氣有虛實病有盛衰治有緩急方有小大有正治之法有反治之法以寒治熱以熱治寒名曰正治以寒治寒以熱治熱名曰反治寒因熱用熱因寒用通因通用塞因塞用發表不逺熱攻裏不逺寒形不足者溫之以氣精不足者補之以味有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者木欎達之謂吐令其調達也火欎發之謂汗令其疏散也土欎奪之謂下令無壅礙也金欎泄之謂滲泄解表利小便也水欎折之謂抑其衝逆也通其五法氣乃平調復視其虛實而調之此非所謂欎法也乃止欎而病者也然病有久新方有大小有毒無毒因宜而制矣此皆經㫖治法之略文也可詳審而施用其藥之五味大抵不過於五藏所入之味而為補寫甘入脾酸入肝鹹入腎苦入心辛入肺而所入之味亦不過因其性而調治之辛主散酸主收甘主緩苦主堅鹹主耎辛甘發散為陽酸苦涌泄為隂淡味滲泄為陽此用藥之大法也五運之中又有必折其欎氣先取化源之法𤣥珠以謂大陽司天取九月寫水之源陽明司天取六月寫金之源少隂司天少陽司天取三月寫火之源大隂司天取五月寫土之源厥隂司天取年前十二月寫木之源乃用針迎而取之之法也故曰無失天信無逆氣宜無翼其勝無贊其復是謂主治者此也蓋用藥之制有法存焉故經曰君一臣二竒之制也君二臣四偶之制也君二臣三竒之制也君三臣六偶之制也近者竒之逺者偶之汗者不可以竒下者不可以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄各適其主此之謂也又曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之又曰主病之謂君佐君之謂臣應臣之謂使非上中下三品也三品者以明善惡之殊貫也此乃論用藥之妙者也神農本草藥有三品上藥為君中藥為臣下藥為佐使所以異善惡之名服餌之道不必皆然以主病者為君餘為臣使以贊成方論也故五運六氣之補寫五味各異者大法正如此諸為方者不必盡用之但一佐二佐病則止矣謂如以酸寫之豈有一方盡用本草味酸者為寫藥蓋主病者得一二味可也餘則皆然或者以謂嵗運大角木王土衰迎取之當使寫肝經而益其脾胃人人如此何病之有此非通論也何哉豈有人人藏府皆同者假如肝元素虛脾氣素盛遇此大角之運肝木稍實脾氣得平方獲安和若便寫肝補脾此所謂實實虛虛損不足益有餘如此而死者醫殺之耳故在工以詳之餘氣同法然藥之治病對其標本可謂神聖也針之去疾對其愈穴可謂工巧也用之要妙去其疾勢若鼓之應桴機之發矢其驗也如是而速失而害人亦如是矣是不容其誤蓋害人增疾則尤甚也何哉蓋天下事物之理益之則遲而損之則速若服一藥取其效則緩而微若食一發病之物俄頃而知由是觀之成難毁易理之常也可不慎哉上聖垂示妙㫖愍念黎元丁寧開諭遞相問難唯恐人之不至後世醫士之流智識䝉昧為學褊淺不悟其㫖猶言隱法甚可咤也其錯簡斷文去聖遙逺則有之蓋素問之書先於五經論天文地理人事五行要妙為隂陽之宗師作醫術之淵藪義造精微文演敷暢自上古至于今得其㫖趣唯王冰一人而已五行勝復論素問之書載黃帝與岐伯雷公鬼臾區答問其間論太虛之寥廓紀五運回薄并包該貫微妙精密天地之數不可得而逃鬼神之情不可得而遁世之學者往往伏而讀之每患其不能通也客有好其書者指五運六氣之疑詣澶淵胡源而問曰元豐之四年嵗在辛酉陽明司天為上商少隂在泉為下微天氣燥地氣熱運得少羽嵗水不及是謂涸流之紀而河决大水蓋與涸流之名紀異矣請試為我言之胡源喟然嘆曰深乎哉問也此非不敏之所能及也然昔嘗侍坐于先生而得聞先生之緒餘先生之論五行也成象而麗乎天為五星成形而鎮乎地為五嶽其精而藏乎內為五藏其神而運乎外為五官以至德為五常和為五味彰為五色發為五聲其植物五谷五果為異宜其動物五畜五蟲為異類蓋天數五地數五五位相得而各有合變化之所以成也鬼神之所以行也是故天一地六合于北方而為水而丙辛主之地二天七合于南方而為火而戊癸主之天三地八合于東方而為木而丁壬主之地四天九合于西方而為金而乙庚主之天五地十合于中央而為土而甲巳主之此五者或以參天或以兩地兩地者火也金也生于隂而成于陽參天者水也木也土也生于竒而成于偶錯綜其數則五者雖不同及其立嵗紀運則要之氣常均平而不相害也是以木之平氣貴乎和風生發而無飄蕩振拉火之平氣貴乎炳明光顯而無炎爍燔燎土之平氣貴乎埃雲潤澤而無霖霪驟注金之平氣貴乎霧露清凉而無慘悽殘賊水之平氣貴乎嚴凝整肅而無雨水霜雹然隂陽之相蕩寒暑之相推升降有序休王有時一消一長不能無進退一損一益不能無盛衰是故運行先天而氣或為有餘運行後天而氣或為不及有餘則制已所勝而侮已所不勝不及則已所勝輕而侮之已所不勝侮而乘之夫惟有所不勝故强者有時而兼弱弱者有時而畏强此物之自然而理之必至者也請試言之少角之運嵗木不及侮而乘之者金也金不務德故以燥勝風時則有白露早降收氣早行其變為肅殺其烖為蒼隕名為少角而實與大商之嵗同少徵之運嵗火不及侮而乘之者水也水不務德故以寒勝熱時則有寒氛凝慘地積堅冰其變為溧冽其烖為霜雹名為少徵而實與大羽之嵗同少宫之運嵗土不及侮而乘之者木也木不務德故以風勝濕時則有大風飄暴草偃沙飛其變為振發其烖為散落名為少宫而實與大角之嵗同少商之運嵗金不及侮而乘之者火也火不務德故以熱勝燥時則有火延焦槁炎赫沸騰其變為銷爍其烖為燔炳名為少商而實與大徴之嵗同少羽之運嵗水不及侮而乘之者土也土不務德故以濕勝寒時則有泉涌河衍涸澤生魚其變為驟注其烖為霖潰名為少羽而實與大宫之嵗同通乎此則知嵗在涸流之紀而河决大水固可以類推之也非徒如是而已萬物擾擾凡呼吸俯仰滋蕃長肓乎天地之間者或得其冲氣而生或觸其乖氣而夭未有能逃乎五行者也所謂冲氣者不相勝復而已所謂乖氣者勝復更作而已方其乖氣之爭狼戾已形忿怒已萌處乎此而求勝乎彼也雖有强剛勇悍之氣又豈能常勝哉固已有復之者伺乎其後矣是故木勝則金復以救土而名木不榮火勝則水復以救金而冰雹乃零土勝則木復以救水而倮蟲不肓金勝則火復以救木而流水不氷水勝則土復以救火而黅穀不登夫暴虐無德者烖反及之侮而乘之者侮反受邪出乎爾者反乎爾未有勝而不復者也勝之微者復亦微勝之甚者復亦甚其猶空谷之響乎爾疾徐疏數小大髙下惟其聲之所召未嘗不相似也蓋天地之間氣有偏勝而無以救之則萬物之所存者幾希矣是故風熱燥濕寒五者各司一氣生長化收藏五者各司一時以順相承然後能循環以相生以逆相勝然後能循環以相救故曰五運之氣猶權衡也髙者抑之下者舉之化者應之勝者復之化者應之氣之平也五氣之相得也勝者復之氣之不平也五氣之相賊也氣平而相得者所以道其常氣不平而相賊者所以觀其變古之明乎此而善攝生者何嘗不消息盈虛以道御神也無失天信無逆氣宜抑其有餘者而不翼於勝助其不及者而不贊其復是以喜怒悲憂恐有所一而莫能亂精神魂魄意有所養而莫能傷春風秋雨冬凉夏暑雖天道之屢變如凶荒札瘥不能成其患嗚呼安得圓機之士而與之共論五行哉素問入式運氣論奧卷下
