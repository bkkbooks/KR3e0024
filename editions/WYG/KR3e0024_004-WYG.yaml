body:
  text: 黄帝内經素問遺篇刺法論第七十二黄帝問曰升降不前氣交有變即成暴欎余已知之如何預救生靈可得却乎却之言去也何以去之歧伯稽首再拜對曰昭乎哉問臣聞夫子言既明天元須窮法刺可以折欎扶運補弱全真㵼盛蠲餘令除斯苦夫子者祖師僦貸季折謂折伏也扶謂扶持也蠲除也斯此也令除此苦也帝曰願卒聞之歧伯曰升之不前即有甚凶也木欲升而天柱窒抑之木欲發欎亦須待時木發待間氣也至天作間氣之時作也欲發可刺之也當刺足厥隂之井足厥隂之井即大敦穴在足大指端去爪甲上如韭葉三毛之中乃足厥隂之所出也於平旦水下一刻時以手按穴得動脉下鍼可及三分留六呼如得氣急出之先刺左後刺右又可春分日吐之無此管也火欲升而天蓬窒抑之火欲發欎亦須待時火欎待時至天作左間氣之時也其發也君火春分相火小滿即欲發之時也故君火相火同法即是二時而可預刺之也君火相火同刺包絡之滎心包絡之滎在手掌中勞宫穴也水下二刻以手按穴動脉應手刺可同身寸之三分留六呼得氣而急出之先左後右又法當春三泄汗也土欲升而天衝窒抑之土欲發欎亦湏待時土欎待時至天作左間氣之時也土發欎日維辰維也多於二間維發之也可預刺之也當刺足太隂之俞足太隂之俞太白穴在足内側核骨下䧟者中足太隂之所注也水下三刻刺可同身寸之二分留七呼氣至急出之先左後右金欲升而天英窒抑之金欲發欎亦須待時金欎待時至天作左間氣之日也夏至之後金欲發欎之時在火王後作可預刺也當刺手太隂之經手太隂之經者經渠穴也在兩手寸口脉陥者中手太隂之所行也動脉應手於水下四刻刺可同身寸之三分留三呼氣至急出鍼先左後右水欲升而天芮窒抑之水欲發欎亦須待時水欎待時至天作左間氣之時也發於辰維之後火得王之時水可作也可以預用針刺之也當刺足少隂之合足少隂之合隂谷穴也在膝内輔骨之後大筋之下小筋之上按之應手屈膝而得足少隂之所入也刺可同身寸之四分留三呼動氣應手可刺急出之先刺左後刺右帝曰升之不前可以預備願聞其降可以先防防䕶者也歧伯曰旣明其升必逹其降也升降之道皆可先治也亦可以升而先刺也木欲降而地皛窒抑之降而不入抑之欎發散而可得位三日不降八日降欲降而欎先散而然後作地間氣者也降而欎發暴如天間之待時也降而不下欎可速矣降之不下急速如天欎也便可刺之降可折其所勝也折勝其標而虛其本也故折其勝也當刺手太隂之所出刺手陽明之所入手太隂之所出少商穴也在手大指之端内側去爪甲如韭葉手太隂之井也刺可同身寸之一分留三呼而急出之手陽明之所入曲池穴也在肘外輔屈肘兩骨之間䧟中手陽明之合刺可同身寸之一寸五分留七呼動氣應手至而急出之火欲降而地𤣥窒抑之降而不入抑之欎發散而可矣二日不降七日降欲下而欎散之速可刺之也當折其所勝可散其欎火欎折水可以除之當刺足少隂之所出刺足太陽之所入足少隂之出湧泉穴也在足心䧟者中屈足捲指宛宛中足少隂之井刺可同身寸之三寸留三呼動氣至急出之先左後右足太陽之所入委中穴在膕中央約文中動脉應手足太陽之合也刺可同身寸之五分留七呼氣至而急出之先左後右二次同其法刺也土欲降而地蒼窒抑之降而不下抑之欎發散而可入五日不降十日降欲降而欎散而可速刺之當折其勝可散其欎土欎折水可除其苦當刺足厥隂之所出刺足少陽之所入足厥隂之所出太敦穴也在足大指端去爪甲上如韭葉及三毛之中足厥隂井也刺可同身寸之三分留十呼動氣急出之足少陽之所入陽陵泉穴在膝下同身寸之一寸䯒骨外亷䧟者中是足少陽之合刺可同身寸之六分留十呼動氣至急出之金欲降而地彤窒抑之降而不下散抑之欎發散而可入四日不降九日降欲下而欎散可速刺也當折其勝可散其欎金欎折火可以除之當刺心包胳所出刺手少陽所入也心包胳所出中衝穴也在中指之端去爪甲如韭葉是手心主之井刺可同身寸之一分留二呼動氣至急出之手少陽之所入天井穴也在肘外大骨之後肘後同身寸之一寸兩筋間䧟者中屈肘得之手少陽合刺可同身寸之一寸留十呼動氣應手至而急出之水欲降而地阜窒抑之降而不下抑之欎發散而可入一日不降六日降欲下而欎散先可刺之也當折其土可散其欎折其所勝可以散之也當刺足太隂之所出刺足陽明之所入足太隂之所出隠白穴也在足大趾之端側去爪甲如韭葉足太隂之井刺可同身寸之一分留三呼得氣至乃出之足陽明之所入三里宂在膝下三寸䯒骨外廉兩筋間足陽明之所合刺可同身寸之五分留十呼得氣至而急出之帝曰五運之至有前後與升降徃來有所承抑之可得聞乎刺法歧伯曰當取其化源也是故大過取之不及資之大過取之次抑其欎取其運之化源令折欎氣不及扶資以扶運氣以避虛邪也不及者當資其化源以補其所虧令不勝資取之法令出宻語資取化源法方明於𤣥珠密語第一卷中黄帝問曰升降之刺以知要願聞司天未得遷正使司化之失其常政即萬化之闕其皆妄然闕民為病可得先除欲濟羣生願聞其說明其遷正故可預防歧伯稽首再拜曰悉乎哉問言其至理聖念慈憫欲濟羣生臣乃盡陳斯道可申洞微申顯也洞深也微妙也言可盡顕深妙太陽復布即厥隂不遷正即天運不和順四序失令而作疫也不遷正氣塞於上當寫足厥隂之所流氣舒而復塞之故冩之當冩足厥隂之所流行間穴也在足大趾之間動脉應手䧟者中足厥隂之榮刺可同身寸之六分留七呼動氣至而急出之厥隂復布少隂不遷正天失時令即氣令不正也不遷正即氣塞於上熱欲化而風乃布外也當刺心包胳脉之所流心包胳脉之所流勞宫穴也在掌中央刺可同身寸之三分留六呼動氣至而急出也少隂復布太隂不遷正子午天數有餘丑未不得中正也不遷正即氣留於上雨欲化而熱布於天當刺足太隂之所流足太隂之所流大都穴也在足大趾本節後䧟者中足太隂脉之榮也刺可同身寸之三分留七呼動氣至而出之太隂復布少陽不遷正丑未天數有餘寅申未得中正不遷正則氣塞未通熱欲化而雨復布天當刺手少陽之所流手少陽之所流液門穴也在手小指次指間陥者中手少陽之滎也刺可同身寸之二分留三呼動氣至而急出也少陽復布則陽明不遷正寅申天數有餘邜酉未得司天不遷正則氣未通上燥欲治天熱化復治當刺手太隂之所流手太隂之所流魚際穴也在手大指本節後内側散脉文中手太隂之滎也刺可同身寸之二分留三呼動氣至而急出之陽明復布太陽不遷正夘酉天數未終辰戌未得司正不遷正則復塞其氣寒欲行天而燥復化當刺足少隂之所流足少隂之所流然谷穴也在足内踝前起大骨下䧟中足少隂之滎也刺可同身寸之三分留三呼動氣至而出之帝曰遷正不前以通其要願聞不退欲折其餘無令過失可得明乎歧伯曰氣過有餘復作布正是名不過位也即名布正再治天而不能退位使地氣不得後化新司天未可遷正故復布化令如故也新嵗司天未得中司去歳司天仍舊治天是故氣過天令失常故與民作灾之病也己亥之歳天數有餘故厥隂不退位也至子午之年猶尚治天風行於上木化布天雨濕之化不令風化至酷作灾當刺足厥隂之所入足厥隂之所入曲泉穴也在膝内輔骨下大筋上小筋下後䧟者中屈膝而得之足厥隂之合也刺可同身寸之六分留七呼動氣至急出其針也子午之歳天數有餘故少隂不退位也至丑未之年猶尚治天熱行於上火餘化布天燥清之虧雨化不令熱化復行天令也當刺手厥隂之所入心包之所入曲澤穴也在肘内廉下陥者中屈肘而取之手厥隂之合也刺可同身寸之三分留七呼動氣至而急出之丑未之歳天數有餘故太隂不退位也至寅申之年猶尚治天也濕行於上雨化布天寒化虧熱化不令濕化復布行天令當刺足太隂之所入足太隂之所入太隂陵泉穴也在内側輔骨下陥者中足太隂之合刺可同身寸之五分留七呼動氣至而急出之也寅申之歳天數有餘故少陽不退位也至夘酉之年猶尚治天熱行於上火化布天燥清令虧熱化復治布行天令當刺手少陽之所入手少陽之所入天井穴也在肘外大骨後肘後上一寸兩筋間䧟中屈肘得之手少陽之合也刺可同身寸之三分動氣至而急出之也夘酉之歳天數有餘故陽明不退位也至辰戌年猶尚治天也闕行於上燥化布天風化虧而寒化不令清化復治布行天令當刺手太隂之所入手太隂之所入尺澤穴也在肘約文中動脉應手手太隂之所合也刺可同身寸之三寸留三呼動氣至而急出之辰戌之歳天數有餘故太陽不退位也至己亥之年猶尚治天也寒行於上凛水化布天熱化令虧風化不令寒化復治布行天令當刺足少隂之所入足少隂之所入隂谷穴也在膝下内輔骨之後大筋之下外筋之上按之應手屈膝而得之足少隂之合刺可同身寸之四分動氣至而急出之故天地氣逆化成民病以法刺之預可平痾人氣通乎天地也氣交有變前後餘退可使天元刺其餘源始終可平也黄帝問曰剛柔二干失守其位使天運之氣皆虛乎與民為病可得平乎天運如虛可以法刺可除之也歧伯曰深乎哉問明其奥㫖天地迭移三年化疫是謂根之可見必有逃門是謂根䆒天地之災必有避危逃生之門戸假令甲子剛柔失守柔得其位上失其剛雖得交司數可未至甲子上未終司己夘下雖迁正是謂柔干孤虛其下也剛未正之已不得其甲即土運反虛而木廼勝剛未正柔孤而有虧甲不正於己也土運不令正失少隂不化是故天與皆虛而使邪化疫者也時序不令即音律非從司天猶布而中運有勝至矣甲未臨而己巳至律無音而吕有聲即黄鐘大宫不應夾鐘少宫即應以表己夘下位孤主土運者也如此三年變大疫也甚則速首尾三年至詳其微甚察其淺深大虛而布政日乆即深也深即甚矣運未正即勝至乆即深甚也甚即深首尾三年至者也欲至而可刺刺之則以明其刺法者即是布正而未遷正者可刺其即今之病也只言知者是以三年中有大疫至刺補其夭之之吉也即其細詳微甚知其所至之斯可先齊之者也當先補腎俞土疫至而腎虛者先補之腎俞在骨第十四椎下兩傍各同身寸之一寸五分未刺時先口㗸針暖而用之用圓利針臨刺時呪曰五帝上真六甲𤣥靈氣符至隂百邪閉理念三遍自口中取針先刺二分留六呼次入針至三分動氣至而徐徐出針以手捫之令受針人咽氣三次又可定神魂者也次三日可刺足大隂之所注足太隂之所注大白穴也在内踝核骨下䧟者中足太隂脉之所注也先以口㗸針令温欲下針時呪曰帝扶天形䕶命成靈誦之三遍廼刺三分留七呼動氣至而急出其針也又有下位己卯不至而甲子孤立者次三年作土癘其法補瀉一如甲子同法也即甲子甲戌甲申甲午甲辰甲寅并及己丑己亥己酉己未己巳己夘凡甲巳上下失守皆此一法而已其刺以畢又不須夜行及逺行令七日潔清净齋戒所有自來腎有乆病者可以寅時面向南净神不亂思閉氣不息七遍以引頸嚥氣順之如嚥甚硬物如此七遍後餌舌下津令無數仙家嚥氣可以深根固蔕以子受母氣也嚥下氣令腹中鳴至臍下子氣見母元氣故曰反本還元也乆餌之令深根以養固蔕也故嚥氣津者此名天池之水可乆餌之資精氣血蕩滌五藏先溉元海一名離宫之水一名玉池一名神水不可唾之但可餌之以補精血可益元海也假令丙寅剛柔失守柔得其位上失其剛也雖得其交歳而丙未遷正治天下辛巳獨治其泉上位丙失其剛干故中水運不得運大過也反受土勝之上剛干失守下柔不可獨主之柔干在上猶言不及何况柔失剛者也中水運非大過不可執法而定之不以諸丙年作其水大過也當推之天數而知有虧也布天有餘而失守上正天雖主治之此即布正之化正司主嵗未得正位也天地不合即律吕音異柔干至而吕有音應剛干未遷而律管無聲即少羽鳴響而大羽不調也如此即天運失序雖有化而非常化也後三年變疫變有微甚故有遲速當推其天數之淺深也詳其微甚差有大小大差七分小差五分每一分一十五日大差速至小差徐徐而至之也徐至即後三年至甚即首三年推數差速即知運遲當先補心俞心俞在背第五椎下兩傍各一寸半用圓利針於日中令温暖次以手按穴得其氣動廼呪曰太始上清丹元守靈誦之三遍先想火光於穴下然後刺可同身寸之一寸半留七呼得氣至次進針三分以手弹之令氣至而下針得動氣至而徐徐出針次以手捫其穴令受針人閉氣三息而嚥氣也次五日可刺腎之所入腎之所入隂谷穴也在膝内輔骨之後大筋之下小筋之上按之應手屈膝而得之用圓利針令口中温暖先以手按穴廼呪曰大微帝君五氣及真六辛都司符扶黒雲誦之一遍刺可入同身寸之四分得動氣至而急出之又有下位地甲子辛巳柔不附剛亦名失守即地運皆虛後三年變水癘即刺法皆如此矣即丙寅丙子丙戌丙申丙午丙辰辛丑辛亥辛酉辛未辛巳辛邜如此上下失守皆推大小差而刺之其刺如畢慎其大喜欲情於中如不忌即其氣復散也令静七日七日後神氣實而水疫不傷心欲實令少思思即傷神居當澄心而神守中即道自降而其氣復上人亂想勞神即隂中鬼王勞神即神役苦志心亂故夭人命實即神和志安心静即中也假令庚辰剛柔失守乙得其位上失其庚即謂柔失其剛也雖得其嵗即庚未得中位也乙得下位不治其地上位庚失其剛干故中金運不得大過反受火勝之也上位失守下位無合乙未在下主地孤立也上無剛干正之天運虛乙庚金運故非相招上下相招隂陽相合也司天與運各得其化布天未退中運勝来不以陽年元勝復支干不合有上下相錯謂之失守庚不與乙相對合也姑洗林鍾商音不應也失守即同聲不相應也姑洗上管庚辰太商不相應林鐘下管乙未少商獨應矣如此即天運化易故四序非常也三年變大疫金疫又名殺疫詳其天數差有微甚大差七分即氣過一百五日即甚矣小差五分即氣過七十五日即微也微即微三年至微即徐也甚即甚三年至甚即速也當先補肝俞肝俞在背第九椎下兩傍各一寸半用圓利針以口温暖先以手按穴得動氣欲下針而呪曰氣從始清帝符六丁左施蒼城右入黄庭誦之三過先想青氣於穴下然後刺之三分得氣而進針針入五分動氣至而徐徐出針以手捫其穴令受針人嚥氣次三日可刺肺之所行肺之所行經渠穴也在手寸口䧟中手太隂經也用圓利針於口内温令暖先以左手按穴而呪曰太始上真五符帝君元和氣合司入其神誦之三遍刺可同身寸之三分留二呼動氣至而出其針也刺畢可静神七日慎勿大怒怒必真氣却散之又或在下地甲子乙未失守者即乙柔干即上庚獨治之亦名失守者即闕孤主之三年變癘名曰金癘亦名殺癘其至待時也詳其地數之所差亦推其微甚可知遲速爾速至共三年遲即後三年其至如金疫刺法同前也諸位乙庚失守刺法同即天運各異金殺丁之災化民病也同刺而却之也肝欲平即勿怒怒即隂生肝為陽神也隂生即陽夭夜卧念安其志勿誦惡語即陽神魂守中假令壬午剛柔失守下得其位上失其主即司天布正木運反虛也雖交嵗而天未遷正中運勝即地見丁酉獨主其運故行燥勝天未勢化是名二虛者已上壬未遷正下丁獨然即雖陽年虧及不同災亦然三日肝自病風化不令運失其壬未得其位天如布退可得遷正不假復而正角上下失守相招其有期推之天别又及幾分天如復位故得相招者也差之微甚各有其數也差七分計一百五日即大差之期也差五分即七十五日其下者又微也律吕二角失而不和同音有日上律㽔賔下吕南吕上大角不應下少角應故二角失而不和也後壬午遷正之日即上下角同聲相應微甚如見三年大疫微即至乙酉甚即至甲申甚速微徐也當刺脾之俞脾之俞在背第十一椎下兩傍各一寸半動脉應手用圓利針令口中温暖而刺之即呪曰五精智精六甲𤣥靈帝符元首大始受真誦之三遍先想黄氣於穴下然後刺之二分得氣至而次進之又得動氣次進之二進各一分留五呼即徐徐出針以手捫之令其人不息三遍而嚥津也次三日可刺肝之所出也肝之所出大敦穴也在足大趾端去爪甲如韭葉及三毛之中足厥隂之井也用圓利針令口中温暖而刺之即呪曰真精至𤣥大道冥然五神各位氣守三田誦之然後可刺入同身寸之三分留十呼動氣至而出其針刺畢静神七日勿大醉歌樂其氣復散又勿飽食勿食生物歌樂者即脾神動而氣散也醉即性亂飽即食脹故慎忌之食生物即傷脾氣也欲令脾實氣無滯飽無乆坐食無大酸無食一切生物宜甘宜淡淡入胃也宜益府淡者土之薄味也而又次於甘者無閑坐無乆卧故養脾也又或地下甲子丁酉失守其位未得中司即氣不當位下不與壬奉合者亦名失守非名合徳故柔不附剛天地二甲子上下不相招故隂陽有錯即中運失其嵗合之常政也即地運不合三年變癘故名木癘又名風癘其至有即亦推其㣲甚其刺法一如木疫之法即諸丁壬上下失守皆同一法刺之假令戊申剛柔失守戊與癸合也天地二甲子即戊申合癸亥也下位癸亥至地其主地正司也上下位戊申過丁未天數未退而復布天故失守戊癸不合也戊癸雖火運陽年不太過也戊未正司癸下獨治故非大過反受水勝之也上失其剛柔下獨主其氣不正故有邪干水運失守於上中下運有虧也故天虛而地猶主之中見火運水來犯之故曰邪干迭移其位差有淺深天數過差亦有多少却得奉合合要在日數也欲至將合音律先同中火運徴也上下二律吕上窮太少二徴合音同如此天運失時三年之中火疫至矣速至庚戌也徐徐至辛亥所作也當刺肺之俞肺俞在背第三椎下兩傍各一寸半動脉應手用圓利針令口中温暖先以手按穴廼刺之呪曰真邪用摶氣灌元神帝符反本位合其親誦之三遍刺之二分候氣欲至想白氣於穴下次進一分得氣至而徐徐出其針以手捫之於其穴也然可立愈也刺畢静神七日勿大悲傷也悲傷即肺動而真氣復散也凡喜怒悲樂恐皆不可過矣此五者皆可動天亂真神也故聖人忘縁㓕動念可存神也故神能主形神在形全可以身安道常長存也人欲實肺者要在息氣也無大喘息慎勿多言語及呼吸多氣喘及言語多及飲冷形寒食减多大忌悲傷喜怒冷傷其肺神也又或地下甲子癸亥失守者即柔失守位也即上失其剛也即亦名戊癸不相合徳者也即運與地虛後三年變癘即名火癘與火疫同也即法刺一體即諸戊諸癸上下同一體是故立地五年以明失守以濕法刺於是疫之與癘即是上下剛柔之名也窮歸一體也即刺疫法只有五法即總其諸位失守故只歸五行而統之也此皆五疫癘歸天地不相和之氣化為疫癘大傷人之命也故逹天元可通法刺復濟生民也黄帝曰余聞五疫之至皆相染易無問大小病狀相似難施救療如何可得不相移易者其病相染着如何得不相染也歧伯曰不相染者正氣存内邪不可干避其毒氣天牝從來復得其往邪毒之氣在於泄汗反下取之其氣入於中毒氣至腦中流入諸經之中令人染病矣如人􅅉得此氣入鼻至腦中欲避之令勿投鼻中令􅅉之即出爾如此即不相染也氣出於腦即不邪干從鼻而入腦欲干復出即無相染也氣出於腦即室先想心如日即正氣存中而神守其本即邪疫之氣不犯之欲将入於疫室先想青氣自肝而出左行於東化作林木如春栢之蒼翠次想白氣自肺而出右行於西化作戈甲如劔㦸之明白利刄次想赤氣自心而出南行於上化作熖明如赫赫之炎燥次想黒氣自腎而出北行於下化作水如波浪之黒色次想黄氣自脾而出存於中央化作土如大地之黄色五氣䕶身已畢次想頭上如北斗之煌煌然後可入於疫室即正氣存中而邪疫不干又一法於春分之日日未出而吐之用逺志去心以水煎之飲二盞吐之不疫者也又一法於雨水日後三浴以藥泄汗注汗出臭者無疫也又一法小金丹方辰砂二兩水磨雄黄一兩葉子雌黄一兩紫金半兩粉作末令細之同入合中外固了地一尺築地實不用爐不須藥制用火二十斤煆之也七日終常令火及二十斤候冷七日取次日出合子埋藥地中七日亦須吉地者佳也取出順日研之三日煉白沙蜜為丸如梧桐子大每日望東吸日華氣一口氷水下一丸和氣嚥之服十粒無疫干也黄帝問曰人虛即神遊失守位使鬼神外干是致夭亡何以全真願聞刺法歧伯稽首再拜曰昭乎哉問謂神移失守雖在其體然不致死或有邪干故令夭夀邪未干而不病邪欲干而有卒亡也只如厥隂失守天以虛人氣肝虛感天重虛即魂遊於上肝虛天虛又遇出汗於肝而三虛散神遊上位左無英君下即神光不聚而白尸鬼至令人卒亡者也邪干闕大氣身闕猶可刺之目中神彩有四肢雖冷心腹尚温如口中無涎舌不邜縮者非感厥也即名尸厥故可救之復蘇刺其足少陽之所過足少陽之所過丘墟穴也在足外踝下如前䧟者中去臨泣同身寸之五寸足少陽之原也用毫針於人近體煖針至温以左手按穴呪曰太上元君常居其左制之三魂誦之三遍次呼三魂名爽靈胎光幽精誦之三遍次想青龍於穴下刺之可以同身寸之三分留三呼可徐徐出針親令人按氣於口中腹中鳴者可治之次刺肝之俞在背第九椎下兩傍各一寸半用毫針着身温之左手按穴呪曰太微帝君元英制魂真元及本令入青雲又呼三魂名如前三遍刺入同身寸之三分留三呼次進二分留三呼復取針至三分留一呼徐徐出即氣反而復活人病心虛又遇君相二火司天失守感而三虛又或汗出於心即致神魂逆於上入泥丸遇火不及黒尸鬼犯之令人暴亡不出一時可救之四肢冷氣雖閉絶不變色舌闕如不卵者可救目中神彩不變者可刺之也可刺手少陽之所過手少陽之所過陽池穴也在手表腕闕䧟者中手少陽之原也用毫針人身温煖以手按穴呪曰太一帝君泥丸緫神丹無黒氣來復其真誦之三遍想赤鳯於穴下刺入二分留七呼次進一分留三呼復退留一呼徐徐手捫其穴即令復活也復刺心俞在背第五椎下兩傍各一寸半用毫針着身温煖以手按穴呪曰丹房守靈五帝上青陽和布體來復黄庭誦之三遍刺可同身寸之七分留一分次進一分留一呼退至二分留一呼徐徐而出針以手捫其穴也人脾病又遇太隂司天失守感而三虛重虛而汗出於脾因而三虛智意二神遊於上位故曰失守又遇土不及青尸鬼邪犯之於人令人暴亡不出一時可救之也四肢冷而身温唇温者可活之矣口中無涎即名尸厥可刺足陽明之所過足陽明之所過衝陽穴也在足附上骨間動脉去䧟谷三寸足陽明之原也用毫針着人身温煖以手按穴呪曰常在魂庭始清太寧元和布氣六甲反真誦之三遍先想黄庭於穴下刺入三分留三呼次進二分留一呼徐徐退而以手捫之者也復刺脾之俞在背第十一椎下兩傍各一寸半用毫針以手按之呪曰太始定位總統坤元黄庭真氣來復遊全誦之三遍刺之三分留二呼進至二分動氣至徐徐出針人肺病遇陽明司天失守感而三虛人虛天虛又汗出於肺因而三虛即魂遊於上故曰失守之也又過金不及有赤尸鬼干人令人暴亡不出一時可救之雖無氣手足冷者心腹温鼻微温目中神彩不轉口中無涎舌􅆑不縮者皆可刺活也可刺手陽明之所過手陽明之所過合谷穴也在手大指次指間手陽明之原也用毫針着人體温煖先以手按穴呪曰青氣真全帝符日元七魄歸右今復本田誦之三遍想白氣於穴下刺入三分留三呼次進針至五分留三呼復退一分留一呼徐徐出針以手捫其穴復活也復刺肺俞肺俞在背第三椎下兩傍各一寸半用毫針着體温煖先以手按穴呪曰左元真人六合氣賔天符帝力來入其司誦之三遍針入一寸半留三呼次進二分留一呼徐徐出針以手捫其穴也人腎病又遇太陽司天失守感而三虛人虛天虛又感出汗於腎感而三虛即腎神退遊於黄庭雖不離體神光不聚故失守也又遇水運不及之年有黄尸鬼干犯人正氣吸人神魂致暴亡氣絶四肢厥冷心腹微温眼色不易唇口及舌不變口中無涎即可救也可刺足太陽之所過足太陽之所過京骨穴也在足外側大骨下赤白肉際䧟者中是足太陽之原也用毫針着人身温煖以手按穴呪曰元陽育嬰五老反真泥丸𤣥華補精長存想黒氣於穴下刺入一分半留三呼廼進至三分留一呼徐徐出針以手捫其穴也刺足少陽之俞在背第十椎下兩傍各一寸半用毫針先以手按穴呪曰天𤣥日晶太和昆靈真元内守持入始清誦之三遍刺之三分留三呼次又進五分留三呼徐徐出針以手捫之黄帝問曰十二藏之相使神失位使神彩之不圓恐邪干犯治之可刺願聞其要五神失守以明刺法又言十二神之妙用也岐伯稽首再拜曰悉乎哉問至理道真宗此非聖帝焉究斯源是謂氣神合道契符上天人氣動合司天神氣相合由乎盛衰也心者君主之官神明出焉任治於物故為君主之官故心從形有神託心斯存是故心者神之舎也即真心失守虚而神不守位即妄遊諸室五神不安而乃令虚也可刺手少隂之源手少隂之源者即是兊骨穴也此是真心之源在掌後兊骨之端䧟者中一名中都用長針口中温煖刺入三分留三呼進一分留一呼徐徐出針以手捫其穴復蘇也肺者相𫝊之官治節出焉位髙為君故官為相傳主行榮衛故治節由之喘息而自然有多語失節飲冷形寒悲愴是以肺神不守位即虚也可刺手太隂之源肺之源出於大淵在掌後大筋一寸五分間䧟者中手太隂之所過用長針以口中温針以手按穴刺入同身寸之三分留三呼動氣至而徐徐出針以手捫穴肝者將軍之官謀慮出焉勇而能斷故曰將軍潜發未萌故曰謀慮出焉怒而氣上過氣交不前因而神失守神光不聚可用前法刺之全神守者也可刺足厥隂之源足厥隂之源太衝穴也在足大趾本節後二寸䧟者中乃肝脉所過為源用長針便於口中先温針以手按穴刺可入三分留三呼進二分留二呼徐徐出針以手捫之也膽者中正之官决斷出焉剛正果决故官為中正直而不疑故决斷出焉交動而卒怒怒而不息氣上而不守位使人中正不利欲成膈噎神光不聚未有邪干先可以刺治之者也可刺足少陽之源足少陽之源丘墟穴也在足外踝下如前䧟者中去臨泣穴五寸足少陽之所過也用長針於口内温針先以左手按穴刺可同身寸之三分留三呼進至五分留二呼徐徐出針以手捫之也膻中者臣使之官喜樂出焉膻中者在胷兩乳間為氣海手厥隂包絡之所居此作相火位故言臣使主其喜樂中及驚喜怒思恐即神失守位使人如失志恍恍然神光不聚邪來干之可用刺法治之正神和也可刺心包胳所流勞宫穴也在手掌中央動脉手心主之所流也用長針於口中温先以左手按穴刺可同身寸之三分留二呼徐徐出針以手捫其穴也脾為諫議之官知周出焉心有所憶謂之意意中出焉謂之智智周萬事皆從意智也故知周出焉意有所着欲念生他想勞意不已智有所存神遊失守則神元不聚可預治之者也可刺脾之源脾之源在足内側核骨下䧟者中是足太隂之所過為源用長針於口内温針先以左手按穴刺可入三分留五呼進至三分留五呼即可徐徐而退針以手捫之胃為倉廪之官五味出焉包容五榖是謂倉廪之官勞養四傍故云五味出焉飲食飽甚汗出食飽房室即氣留滯注神遊失守邪干未至可以預治全真可刺胃之源胃之陽衝陽穴也在足跗上如同身寸之五分骨間動脉上去䧟谷穴五寸是足陽明之所過用長針於口中温針先以左手按穴刺可入三分留三呼進至二分徐徐出針以手捫其穴大腸者傳道之官變化出焉傳道為傳不潔之道變化謂變化物之形故云傳道之官變化出焉男子有反之過故失守位邪非干之以刺法治之即令反却蘇也可刺大腸之源大腸之源合谷穴也在手大指次指曲骨間手陽明之所過也用長針口中温針刺入三分留三呼進至二分留一呼徐徐出之也小腸者受盛之官化物出焉承􅆢胃司受盛糟粕受元復化傳入大腸故云受盛之官化物出焉受而有異非合不合神失守可刺全真者可刺小腸之源小腸之源腕骨穴也在手外側腕前起骨下䧟者中手太陽之所過也用長針於口中温針先以左手按穴刺可入三分留三呼進二分留一呼徐徐出針次以手捫其穴也腎者作強之官伎巧出焉強於作用故曰作強造化形容故曰伎巧在女則當伎巧在男正曰作強人強作過失動合於三元八正之日故神失守位也故預刺而可全真者也刺其腎之源腎之源出於大谿在足内踝下跟骨之前䧟者中足少隂之所過為源用長針於口中温針先以左手按穴刺入三分留一呼進一分留一呼徐徐出針以手捫其穴也三焦者决瀆之官水道出焉引道隂陽開通閉塞故官司決瀆水道出焉決瀆者如四瀆入大海不離其水百川入海只江河淮濟入海不變其道故曰四瀆也三焦決瀆即精與水道不相合也故曰三焦者上中下上焦者主内而不出或非内而即内故不守中焦者主腐熟水榖或情動於中人或非動而動是謂孤動者神失守位下焦者主出而不内或當出而不出者故曰神失守位也刺三焦之源三焦之源陽池穴也在手表腕上䧟者中手少陽脉之所過也用長針於口中温針先以左手按穴刺可入三分留三呼進一分留一呼徐徐出針以手捫穴也膀胱者州都之官精液藏焉氣化則能出矣位當孤府故曰都官居下内空故藏精液若得氣海之氣施化則溲便注泄氣海之不足則閟隠不通故曰氣化則能出矣人若滯便而合氣注膀胱故精泄氣動水道不宣通故神失守位即可以刺法全真者方知此法大妙也刺膀胱之源膀胱之源京骨穴也在足外側大骨下赤白肉際䧟者中足太陽之所過用長針於口中温針先以左手按穴刺可入三分留三呼進二分留三呼徐徐而出針以手捫其穴也凡此十二官者不得相失也失則災害至故不得相失失之則神光不聚故有邪干犯之即害天命宜先刺以全真也是故刺法有全神養真之㫖亦法有修真之道非治疾也故要修養和神也神為主養之宗故作先也道貴常存補神固根精氣不散神守不分内三寳即神氣精一失其位三者皆傷三者同守故曰元和也然即神守而雖不去亦全真神如去即死矣然雖在其體身中而未去者亦非守位而全真也人神不守非逹至真神不守即光明不足故要守真而聚神光而可以修真真勿令泄人為知道至真之要在乎天𤣥人在母腹先通天𤣥之息是謂𤣥牝名曰谷神之門一名神顗一名上部之地户一名人中之岳一名胎息之門一名通天之要人能忘嗜欲定喜怒又所動随天𤣥牝之息絶其想念如在母腹中之時命曰返天息而歸命廻入寂㓕反太初還元胎息之道者也神守天息復入本元命曰歸宗人有諸疾守位之神可入𤣥中之息而歸命之真全神之道可乆覬也本病論篇第七十三黄帝問曰天元九窒余已知之願聞氣交何名失守六氣升降上下交位以五藏配天地之常歧伯曰謂其上下升降遷正退位各有經論上下各有不前故名失守也天元玉冊云六氣常有三氣在天三氣在地也即一氣升天作左間氣一氣入地作右間氣一氣遷正作司天一氣遷正作在泉一氣退位作天左間氣一氣退位作地右間氣氣交有合常得位所在至當時即天地交廼變而方泰也天地不交廼作病也是故氣交失易位氣交廼變變易非常即四時失序萬化不安變民病也於是六氣有升不得其升者欲降而不得其降者有當遷正而不得遷正者自當其位而不得位故有如此之分則天地失其常政故萬民不安也帝曰升降不前願聞其故氣交有變何以明知再問窮源用也歧伯曰昭乎問哉明乎道矣氣交有變是謂天地機木欲升上見天柱窒二火欲升上見天蓬窒土欲升上見天衝窒金欲升上見天英窒水欲升上見天芮窒是故天窒所勝而不前者但欲降而不得降者地窒刑之木欲降而地皛窒刑之火欲降而地𤣥窒刑之土欲降而地蒼窒刑之金欲降而地彤窒刑之水欲降而地阜窒刑之地九窒法天之象本勝之氣故不降也又有五運太過而先天而至者即交不前運逢陽年於有司之至也至後交勝而不過但欲升而不得其升中運抑之木欲升而中見金運勝之二火欲升而中見水運勝之土欲升而中見木運勝之金欲升而中見火運勝之水欲升而中見土運勝之者皆遇運太過早至其中而先於氣交而抑之不前者也但欲降而不得其降中運抑之然五運逢太過而先至其中故降而不下中運刑之抑之不前也於是有升之不前降之不下者有降之不下升而至天者有升降俱不前作如此之分别即氣交之變變之有異常各各不同灾有微甚者也是故上下天地之升降交氣有天窒地窒之勝尅中運抑伏淺深是故民病微甚異爾也帝曰願聞氣交遇㑹勝抑之由變成民病輕重何如欲明其變病本源之證也歧伯曰勝相㑹抑伏使然六氣升降乃經論之道也氣交之常也遇㑹之不常而相投之勝伏抑之成欎者也是故辰戌之歳木氣升之主逢天柱勝而不前辰戌之嵗太陽遷正作司天也即厥隂作地而作右間至此嵗而升天作左間也又遇司天深計筭位至天柱窒也木欲升天柱金司天土勝之不前也又遇庚戌金運先天中運勝之忽然不前庚年金運先天至次後十三日始交司天欲升而金運抑之也木運升天金廼抑之或上見天柱窒或中見金運也升而不前即清生風少肅殺於春露霜復降草木乃萎民病温疫早發咽嗌廼乾四肢滿肢節皆痛乆而化欎至天得左間日廼發作也即大風摧拉折隕鳴紊民病卒中徧痺手足不仁青埃見時風疫乃作民反張肢體直強治之逹三俞也是故己亥之嵗君火升天主窒天蓬勝之不前君火以在地三年至己亥之嵗少隂升天作左間也此可定之也天蓬水司水天元冊用除筭至坎宫除其數者即天蓬窒作主司故水窒勝也又厥隂木遷正則少隂未得升天水運以至其中者君火欲升而中水運抑之即天蓬水司勝即或水運抑之升之不前即清寒復作冷生旦暮民病伏陽而内生煩熱心神驚悸寒熱間作日乆成欎二七日不降以為日乆也即暴熱廼至赤風腫翳化疫温癘暖作至天作左間日廼作也民病伏熱内煩痺而生厥甚則血溢也赤氣瘴而化火疫皆煩而躁渴渴甚治之以泄之可止是故子午之嵗太隂升天主窒天冲勝之不前太隂在地二年畢一年廼升天作少隂之左間也此即定矣其天衝窒至有法即不可前定之也如㑹天衝窒即土不可便升之也故曰升之不前也又或遇壬子木運先天而至者中木遇抑之也木升於太寒之日也木早至十三日上故升或遇闕此二木抑之者土迁抑甚而病深之也升天不前即風埃四起時舉埃昏雨濕不化民病風厥涎潮徧痺不随脹滿乆而伏鬱即十日不升者至以為日乆也即黄埃化疫也間氣上鬰之大疫也民病夭亡臉肢府黄疸滿閉濕令弗布雨化廼微黄埃起而黄風化疫皆肢體痛而口苦者是故丑未之年少陽升天主窒天蓬勝之不前少隂在地三年畢至此嵗升天作太隂左間也此可前定之也天蓬失筭位取之法不定也或遇之者即水運之可升之於火故不可便升也又或遇太隂未遷正者即少隂未升天也水運以至者即升天不前者有此二抑之者也升天不前即寒雰反布凛冽如冬水復涸氷再結暄暖乍作冷復布之寒暄不時民病伏陽在内煩熱生中心神驚駭寒熱間爭以乆成鬱二七不降以為日乆也即暴熱廼生赤風氣瞳翳至天得位之日廼作化成欎癘廼化作伏熱内煩痺而生厥甚則血溢赤氣生而化大疫皆煩而大熱凉藥不可制於火之欎甚於君火故厥乃血溢也是故寅申之年陽明升天主窒天英勝之不前陽明在地三年畢至此年升天作少陽左間也即經論中乃定矣九窒随天數不足金遇火窒之可勝之不可升天又或遇戊申戊寅火運先天而至太過嵗未交司運先至一十三日金欲升天火運抑之此者遇一即不可升也或二者同㑹其抑大也升之不前即時雨不降西風數舉鹹鹵燥生地鹹鹵生白見硝而燥生也民病上熱喘𠻳血溢乆而化欎四九不升火為日乆也即白埃翳霧清生殺氣民病脇滿悲傷寒􅍠􅅉嗌乾手拆皮膚燥白埃起時殺疫火生民病皆燥而咽乾治可刺之也是故卯酉之年太陽升天主窒天芮勝之不前太陽在地三年畢此年升天作陽明之左間也即經論定矣升天即天芮從之數法推之也水遇土窒之司勝之不可升之抑而復鮮又遇陽明未遷正者即太陽未升天也土運以至己酉己夘水欲升天土運抑之或見天芮窒土刑勝之或見土運抑之有一不勝也升之不前即濕而熱蒸寒生雨間民病注不食不及化乆而成欎十二日不降為日乆也冷來客熱氷雹卒至民病厥逆而噦熱生於内氣痺於外足脛痠疼反生心悸懊熱暴煩而復厥黒埃起至寒疫至皆煩而悸厥治之可溢也黄帝曰升之不前余已盡知其㫖願聞降之不下可得明乎再欲細明其道也歧伯曰悉乎哉問是之謂天地微㫖可以盡陳斯道所謂升已必降也一升至天作左間一年二年遷正作司天三年退位作右間四年後降也至天三年次嵗必降降而入地始為左間也入地作左間一年次嵗作遷正司地又次嵗乃退作右間也如此升降往來命之六紀者矣三而在天三而在地一嵗弗從命乎災害先明其升次窮其降也是故丑未之嵗厥隂降地主窒地皛勝而不前又厥隂在天三年次年必降又遇地九窒中地皛西方兊寒金司勝之不可使入其地也抑之不入乃化成民病也又或遇少隂未退位少隂天數有餘作布政故未退一位也即厥隂未降下金運以至中或遇乙丑乙未中見金抑之也金運承之降之未下抑之變欎欎伏之氣降而不下成其民病木欲降下金承之降而不下蒼埃逺見白氣承之風舉埃昏清躁行殺霜露復下肅殺布令乆而不降抑之化欎三日不降八日降不降化風疫也即作風躁相伏暄而反清草木萌動殺霜乃蟄未見懼清傷藏暄和令節大清殺之復布殺霜蒼埃見時風疫至治之吐而得復不可下是故寅申之嵗少隂降地𤣥勝之不入主窒地少隂在天三年四年即降又遇地窒主司地𤣥窒水司降而不入抑伏化為民病也又或遇丙申丙寅水運太過先天而至水運太過至其中即少隂降而不下廼成其欎與民為其災也君火欲降水運承之降而不下即彤雲纔見黒氣反生暄暖如舒寒常布雪凛冽復作天雲慘悽乆而不降伏之化欎二日不降七日降不降即欎發寒勝復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而温病欲作也民皆夜卧不安黄風化疫觧可泄也是故夘酉之嵗太隂降地主窒地蒼勝之不入太隂在天三年至此年降入地作少隂左間也又遇主窒地蒼窒木司勝之不入也又或少陽未退位者即太隂未得降也或木運以至丁酉丁夘木運承之降而不下即黄雲見而青霞彰欎蒸作而大風霧翳埃勝折損廼作乆而不降也伏之化欎十日不降為日乆也天埃黄氣地布濕蒸民病四肢不舉昏眩肢節痛腹滿填臆黄風三舉民病温濕皆痞滿治可大下愈是故辰戌之嵗少陽降地主窒地𤣥勝之不入少陽在天三年畢次年下降入地作太隂左間主地𤣥窒水司勝不入而化民病也又或遇水運大過先天而至也丙辰丙戌水運者也水運承之水降不下即彤雲纔見黒氣反生暄暖欲生冷氣卒至甚即氷雹也乆而不降伏之化欎二日不降七日降不降即欎發也冷氣復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而熱病欲作也民病夜卧不安黄風化疫觧可泄之而愈也是故巳亥之嵗陽明降地主窒地彤勝而不入陽明在天三年次年下降入地作少陽左間也又遇主窒地彤窒火司勝之不入即化成病也又或遇太隂未退位即少陽未得降即火運以至之癸己癸亥火運承之不下即天清而肅赤氣廼彰暄熱反作民皆昏倦夜卧不安咽乾引飲懊熱内煩大清朝暮暄還復作乆而不降伏之化欎四日不降九日降不降即鬱發也天清薄寒逺生白氣民病掉眩手足直而不仁兩脇酸痛滿目忙忙白氣豐而殺疫至皆燥而咽乾􅍠衂治可制之是故子午之年太陽降地主窒地阜勝之降而不入太陽在天三年次年復降入地作陽明左間又遇地阜土司勝之不入者也又或遇土運太過先天而至甲子甲午土運承之降而不入即天彰黒氣暝暗悽慘纔施黄埃而布濕寒化令蒸濕復令乆而不降伏之化欎十二日不降即欎其發也民病大厥四肢重怠隂痿少力天布沉隂蒸濕間作黒氣彰而寒疫至民病皆厥而體重治可益之也帝曰升降不前晣知其宗願聞遷正可得明乎晰明也歧伯曰正司中位是謂遷正位司天不得其遷正者即前司天以過交司之日以過大寒日别嵗正之初氣未至也即遇司天大過有餘日也即仍舊治天數新司天未得遷正也年即以交即司天之氣未交司故也厥隂不遷正即風暄不時花卉萎瘁民病淋溲目系轉轉筋喜怒小便赤太陽司天天數有餘如退位之日厥隂得治遷正也風欲令而寒由不去温暄不正春正失時雖得初氣天令不傳木氣不伸民廼病肝少隂不遷正即冷氣不退春冷後寒暄暖不時民病寒熱四肢煩痛腰脊強直厥隂司天天數有餘厥隂雖有餘日别位司天皆天數終日始遷正如少隂至二月春分得位正之時乃造化變便可遷正乃合司天也木氣雖有餘位不過於君火也木氣有餘數不盡有餘日復治天治數未終遇君火得時化春分日便可遷正木猶未退即可同治於天也其餘氣皆無此也太隂不遷正即雲雨失令萬物枯焦當生不發民病手足肢節腫滿大腹水腫填臆不食飱泄脇滿四肢不舉少隂司天天數未終故曰太隂不得遷正少隂數終可得遷正也雨化欲令熱猶治之温煦於氣亢而不澤少隂有餘未盡天數故不退位即太隂未得遷正即土氣不申而民病於脾也少陽不遷正即炎灼弗令苗莠不榮酷暑於秋肅殺晩至霜露不時民病㾬瘧骨熱心悸驚駭甚時血溢雖有寅申之年土尚治之退位之日火行酷暑於後故渉暑於秋也陽明不遷正則暑化於前肅於後草木反榮民病寒熱􅍠􅅉皮毛折爪甲枯燋甚則喘嗽息髙悲傷不樂少陽司天天數有餘如退位日陽明不遷正也熱化乃布燥化未令即清勁未行肺金復病雖得夘酉之年猶火化熱之令也故肺重復受病太陽不遷正即冬清反寒易令於春殺霜在前寒氷於後陽光復治凛冽不作雰雲待時民病温癘至喉閉溢乾煩燥而渴喘息而有音也陽明司天天數有餘退位日太陽遷正故多煩燥渴喘者也寒化待燥猶治天氣過失序與民作災雖得辰戌之年猶尚清化治天故失序也帝曰遷正早晩以命其㫖願聞退位可得明哉歧伯曰所謂不退者即天數未終天數未終其氣仍治雖遇交司猶未退位也即天數有餘名曰復布政故名曰再治天也即天令如故而不退位也此治天下過而不退位猶在天厥隂不退位即大風早舉時雨不降濕令不化民病温疫疵廢風生民病皆肢節痛頭目痛伏熱内煩咽喉乾引飲厥隂天數有餘在本數之上司天氣髙而災化善也令作布政而復下災故反甚之者也少隂不退位即温生春冬蟄虫早至草木發生民病膈熱咽乾血溢驚駭小便赤澁丹瘤􅇙瘡瘍留毒少隂天下有餘過嵗而復作布政天令酷災矣太隂不退位而取寒暑不時埃昏布作温令不去民病四肢少力食飲不下泄注淋滿足脛寒隂痿閉塞失溺小便數太隂天下有餘過嵗而猶尚治天其氣復下矣病至腎也少陽不退位即熱生於春暑廼後化冬温不凍流水不氷蟄虫出見民病少氣寒熱更作便血上熱小腹堅滿小便赤沃甚則血溢少陽天數有餘至過嵗猶治天甚則氣復下其災至脾肺藏也陽明不退位即春生清冷草木晩榮寒熱間作民病嘔吐暴注食飲不下大便乾燥四肢不舉目瞑掉眩陽明天數太過至交嵗而猶尚治天氣復降其災至甚於肝藏也帝曰天嵗早晩余以知之願聞地數可得聞乎歧伯曰地下遷正升及退位不前之法即地土産化萬物失時之化也即應之生萬物之不時數無次序天令與民作災令數於上下二千失移之中者也帝曰余聞天地二甲子十二十二支上下經緯天地數有迭移失守其位可得昭乎同天地二甲子有上下不合其徳者為失守也歧伯曰失之迭位者謂雖得歳正未得正位之司即四時不節即生大疫天地不合徳即名天地失節即上下二管音不相應即大不主與天主失節上下失音萬物不安也注𤣥珠密語云陽年三十年除六年天刑計有太過二十四年除庚子庚午君火刑金運庚寅庚申相火刑金運戊戌戊辰太陽刑火運也此為與其天地氣上臨中運不得太過者也除此六年皆作太過之用令不然之㫖此即太過作陽年中運餘也忽有上下失支迭位故不為者也今言迭支迭位皆可作其不及也陽年者運太過也五音皆定矣太音也運自勝有餘而無邪傷故名正化疫也其剛干不相對柔干即上下不相招即隂陽相錯天地不合徳中運雖陽多而作太過故有勝復乃至者也假令甲子陽年土運太窒土太過即運傷鱗蟲勝及腎藏氣不及土勝於水也即黄鍾之管音髙故曰太窒也候甲子之氣應者上應鎮星大而明也如癸亥天數有餘者年雖交得甲子甲雖臨子未得遷正厥隂猶尚治天年雖甲子司天尚化風冷厥隂猶復布正於天也地已遷正陽明在泉或名司地即數髙者去嵗少陽以作右間癸亥司地少陽退位以作地下之右間氣者也即厥隂之地陽明故不相和奉者也故曰上下不相招隂陽有相錯即癸與已相對故天地不合徳即以不合甲也癸巳相㑹土運太過虛反受木勝故非太過也何以言土運太過况黄鍾不應太窒木既勝而金還復金既復而少隂如至即木勝如火而金復微謂少隂見厥隂退位而少隂立至故金欲復而火至故復有少也如此則甲巳失守後三年化成土疫晩至於夘甲子至丁卯四年至早至丙寅甲子至丙寅三年至土疫至也至於四維時也大小善惡推其天地詳乎太一又只如甲子年如甲至子而合應交司而治天少隂主甲子年司天遷正應時也即下己夘未遷正而戊寅少陽未退位者亦甲巳下有合也即甲與戊相對子與寅配位也即土運非太過而木乃乗虛而勝土也金次又行復勝之即反邪化也即勝之小而或不復後三年化癘名曰土癘其狀如土疫者本是自天來癘從地至故反化邪生也隂陽天地殊異爾故其大小善惡一如天地之法㫖也假令丙寅陽年太過如乙丑天數有餘者雖交得丙寅雖丙得寅猶未遷正而作司天太隂尚治天也地已遷正厥隂司地或作在泉去嵗太陽以作右間乙丑司地庚辰以退位而作右間即天太隂而地厥故地不奉天化也即上下不相招隂陽有相錯即辛與乙不相合故不合其徳也乙辛相㑹水運太虛反受土勝故非太過即太蔟之管太羽不應土勝而雨化水復即風即天地非其時而有其氣有化大疫即與隂陽復不同也此者丙辛失守其㑹後三年化成水疫晩至己巳丙寅至己巳四年早至戊辰丙寅至戊辰三年甚即速微即徐徐至己巳水疫至也大小善惡推其天地數乃太乙遊宫又只如丙寅年丙至寅且合應交司而治天少陽至而作司天應時遷正即辛巳未得遷正而庚辰太陽未退位者亦丙辛不合徳也即丙與庚相對辰與寅相配位也即水運非太過也即水運亦小虛而小勝或有復丙寅至也即無復也後三年化癘名曰水癘其狀如水疫一名寒疫治法如前假令庚辰陽年太過如己夘天數有餘者雖交得庚辰年也雖庚臨辰猶未遷正陽明猶尚治天地以遷正太隂司地即是在泉云嵗少隂以作右間己夘年地甲子以退少隂作右間也即天陽明而地太隂也故地下奉天也乙巳相㑹金運太虛反受火勝故非太過也即姑洗之管太商不應火勝熱化水復寒刑此天地非時行不節之令即三年始成大疫行天下也此乙庚失守其後三年化成金疫也速至壬午庚辰至壬午三年是其速至徐至癸未金疫至也大小善惡推本年天數及太一也疫至之年又遇失守其災大也不見五福及其太一且惡死人大半也如却㑹合徳者災小爾如見五福與其太一者其災且小善㓕其半也又只如庚辰如庚至辰且應交司而治天太陽主庚辰年司天應時遷正而治天也即下乙未未得遷正者即地甲午少隂未退位者且乙庚不合徳也即甲庚相對辰午相配此名失守非配太過即下乙未干失剛亦金運小虚也有小勝或無復太隂至未即不復也後三年化癘名曰金癘其狀如金疫也金疫又名殺疫金癘又名殺癘治法如前假令壬午陽年太過如辛巳天數有餘者雖交後壬午年也雖壬臨午猶未遷正厥隂猶尚治天地巳遷正陽明在泉丁酉治地去嵗丙申少陽以作右間壬午年丁酉遷正辛巳年丙申退位也即天厥隂而地陽明故地不奉天者也即陽明當上奉少隂不與厥隂奉合也故丁酉與辛巳不相合徳也丁辛相合㑹木運太虛反受金勝故非太過也即蕤賔之管太角不應金行燥勝火化熱復此天地非時行不節之氣即三年始成大疫甚即速微即徐速即首尾三年徐即後三年作疫至大小善惡推疫至之年天數及太一又只如壬至午且應交司而治之少隂壬至午年司天應時而遷正得位者即下丁酉未得遷正者即地下丙申少陽未得退位者見丁壬不合徳也即壬丙相對午申相配此失守非合徳見非太過也即丁柔干失剛亦木運小虛也有小勝小復陽明如至即不復也後三年化癘名曰木癘其狀如風疫法治如前可大吐而治之假令戊申陽年大過如丁未天數大過者雖交得戊申年也雖戊臨申猶未遷正也太隂猶尚治天地巳遷正厥隂在泉癸亥治地去嵗壬戌太陽以退位作右間即天丁未地癸亥故地不奉天化也即厥隂當上奉少陽故不與太隂奉合故丁未與癸亥不相合丁癸相㑹火運太虛反受火勝故非太過也即夷則之管上大徴不應非戊癸相合也故火運不應其夷則未應其徴也下管癸亥少徴應之即下見癸亥主司地故同聲之不相應即上下天地不相合徳故不相應也此戊癸失守其㑹後三年化疫也速至庚戌首尾三年大小善惡推疫至之年天數及太一又只如戊申如戊至申且應交司而治天少陽主戊申年司天應時遷正而治天也即下癸亥未得遷正者即地下壬戌太陽未退位者見戊癸未合徳也即壬戌相對申戌相配此失守非合徳又非太過即下癸柔干失剛見火運小虛也有小勝或無復也厥隂至即無復後三年化癘名曰火癘也治法如前治之法可寒之泄之已上五失守變五疫下五失守變五癘也即上剛柔二干共主運有失支不守之者以此五法即諸陽年也黄帝曰人氣不足天氣如虛人神失守神光不聚邪鬼干人致有夭亡可得聞乎人氣與天氣同失守即鬼邪干人致死也歧伯曰人之五藏一藏不足又㑹天虛感邪之至也其不足之藏與天氣同聲虛也人憂愁思慮即傷心又或遇少隂司天天數不及太隂作接間至即謂天虛也此即人氣天氣同虛也又遇驚而奪精汗出於心大驚汗出於心即心中精脉减少故神失守心也因而三虛神明失守先有勞神之病又遇少隂天數不及也又更驚而奪精此三㑹而神明失守也心為君主之官神明出焉心先有病又遇天虛而感天重虛也心者任治於物故為君主之官清静栖靈故曰神明出焉神失守位即神遊上丹田在帝太一帝君泥丸君下太一帝君在頭曰泥丸君總衆神地君主之官神明失守其位遊於此處不守心位神既失守神光不聚神光即飛圓光也圓光不潔即圓光缺矣即鬼邪隂尸干人却遇火不及之嵗有黒尸鬼見之令人暴亡其火運不及非只癸年戊年失守亦然火司天數不及亦然也黒尸鬼形如黒犬頭似婦人髪蓬不髻目大人見之吸人神魂皆作大聲卒然而亡人飲食勞倦即傷脾即飲食飽舉房事即氣滯於脾以勞役氣滿悶脾藏有病也又或遇太隂司天天數不及即少陽作接間至即謂之虛也人氣與天氣不及即感天人氣虛及又虛也此即人氣虛而天氣虛也又遇飲食飽甚汗出於胃醉飽行房汗出於脾脾胃汗出即精血减少感天虛而作三虛脾神失守其位因而三虛脾神失守先有病於脾次遇天虛脾感天重虚又遇汗出而减其精血乃故名三虛也脾為諫議之官智周出焉脾者心之子心有所憶謂之意意中所出謂之智智周萬物謂之神即脾胃神意智乃故失守其位者也神既失守神光失位而不聚也神光不聚鬼乃干之却遇土不及之年或巳年或甲年失守或太隂天虛青尸鬼見之令人卒亡人乆坐濕地強力入水即傷腎汗出於腎即精血减少故作三虛即精亡心神失守其位也腎為作強之官伎巧出焉因而三虛腎神失守神志失位神光不聚神精志三神虛失位遊於黄庭司命君之下乃即圓光缺矣却遇木不及之年或辛不㑹符或丙年失守或太陽司天虛有黄尸鬼至見之令人暴亡有此三虛又遇水不及即黄尸鬼干人牛頭身黄見之時吸人神魂皆暴亡也人或恚怒氣逆上而不下即傷肝也又遇厥隂司天天數不及即少隂作接間至是謂天虛也肝先病又遇天虛而感重虛也此謂天虛人虛也又遇疾走恐懼汗出於肝肝為將軍之官謀慮出焉神位失守神光不聚神光不聚即圓光缺而不周尸鬼乃干人也又遇木不及年或丁年不符或壬年失守或厥隂司天虛也有白尸鬼見之令人暴亡也有此三虛者即神遊失守白尸鬼干人頭如雞身白有白毛見之吸人神魂皆卒然而亡也已上五失守者天虛而人虛也神遊失守其位即有五尸鬼干人令人暴亡也謂之曰尸厥但卒然而亡口中無涎者舌卵不縮者尸厥若出涎而舌卵縮者厥盛也人犯五神易位即神光不圓也非但尸鬼即一切邪犯者皆是神失守位故也神失守位雖具體中而二氣失位也即神光不聚而邪犯之有妖魅交通徃來皆是五神失守乃邪所至也此謂得守者生失守者死得守者本位而五神各得其居即神光乃圓明而聚矣故一切邪不犯之乃生也得神者昌失神者亡老子云氣來入身謂之生神去於身謂之死故曰命由神生命生神在即命生神去即命天矣所謂神遊失守即不離身故不可便死也其主管在頭上三尊髙位靈主言也即大一帝君在頭曰泥丸總神也無英君左制三魂也白元君右俱七魄也即魂為陽神也魄為隂鬼也若無上三虛主之神離位者死今五神失守亦有主歸即神光不聚圓光亦缺故邪干犯之若神失守其位即知人生神昌黄帝内經素問遺篇
